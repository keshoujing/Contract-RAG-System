server {
    listen 80;
    server_name _;

    # API calls go to the backend service (same-origin from the browser's view).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # agent Q&A + ingestion can be slow
    }

    # SPA: serve the built bundle, fall back to index.html for client routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
